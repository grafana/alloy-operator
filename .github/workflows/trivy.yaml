---
name: CVE Scan

# yamllint disable-line rule:truthy
on:
  push:
    branches: ["main"]
    paths:
      - .github/workflows/trivy.yaml
      - operator/**
      - .trivyignore
  pull_request:
    paths:
      - .github/workflows/trivy.yaml
      - operator/**
      - .trivyignore

  # Catch CVEs newly disclosed against the pinned base image even when nothing
  # in the repo changes.
  schedule:
    - cron: "0 8 * * 1"  # Mondays at 08:00 UTC

  workflow_dispatch:

permissions: {}

jobs:
  scan-image:
    name: Scan operator image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF to the Security tab
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: 'false'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build operator image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: operator
          platforms: linux/amd64
          provenance: false
          sbom: false
          load: true
          push: false
          tags: alloy-operator:scan

      # Report every un-triaged HIGH/CRITICAL finding to the Security tab. Does
      # not fail the build so newly disclosed CVEs stay visible without blocking.
      - name: Scan image (SARIF report)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: alloy-operator:scan
          scanners: vuln
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore
          exit-code: '0'

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@a8d1ac45b9a34d11fe398d5503176af0d06b303e  # v3.30.7
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      # Gate: fail only on HIGH/CRITICAL CVEs that are NOT already triaged in
      # .trivyignore. Fix by bumping the base image digest in operator/Dockerfile,
      # or, if no fixed base image exists yet, add the CVE to .trivyignore.
      - name: Fail on new HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: alloy-operator:scan
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          trivyignores: .trivyignore
          exit-code: '1'
          skip-setup-trivy: true
        env:
          TRIVY_SKIP_DB_UPDATE: 'true'
