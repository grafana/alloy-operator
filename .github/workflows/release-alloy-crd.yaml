---
name: Release Alloy CRD Helm chart
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:

jobs:
  release:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@2e1a58ac8c33aeb7cf1d7b5486e94c14325b924b
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      charts_dir: charts
      cr_configfile: cr.yaml
      ct_configfile: charts/alloy-crd/ct.yaml
    secrets:
      vault_repo_secret_name: github-app
