---
name: Release Alloy CRD Helm chart
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:

jobs:
  release:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@hackathon-17-verify-all-the-charts
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      charts_dir: charts
      cr_configfile: cr.yaml
      ct_configfile: charts/alloy-crd/ct.yaml
      github_app: alloy-operator
